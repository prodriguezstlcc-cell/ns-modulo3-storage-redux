<ActionBar title="Búsqueda"></ActionBar>
<StackLayout>

  <!-- Formulario de búsqueda con two-way binding -->
  <TextField
    [(ngModel)]="query"
    hint="Buscar artículos..."
    returnKeyType="search">
  </TextField>
  <Button text="🔍 Buscar" (tap)="buscar()" class="btn"></Button>

  <!-- Listado de resultados -->
  <ListView [items]="resultados">
    <ng-template let-item="item">
      <FlexboxLayout flexDirection="row" alignItems="center" padding="10">
        <Label [text]="item.titulo" flexGrow="1" class="titulo"></Label>
        <Label [text]="item.categoria" class="badge"></Label>
        <!-- Ícono favorito -->
        <Label
          [text]="esFavorito(item) ? '❤️' : '🤍'"
          fontSize="22"
          (tap)="toggleFavorito(item)">
        </Label>
      </FlexboxLayout>
    </ng-template>
  </ListView>

</StackLayout>
